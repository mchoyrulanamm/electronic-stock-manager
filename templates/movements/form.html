{% extends 'base.html' %}
{% block title %}New Stock Movement{% endblock %}
{% block content %}
<h4>Record Stock Movement</h4>

<div class="card" style="max-width: 600px">
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Stock Code <span class="text-danger">*</span></label>
                <input type="text" name="stock_code" class="form-control" placeholder="e.g. R-001" required value="{{ stock_code or '' }}">
                <div class="form-text">Enter the component's stock code.</div>
            </div>
            <div class="row g-3 mb-3">
                <div class="col-md-6">
                    <label class="form-label">Type <span class="text-danger">*</span></label>
                    <select name="movement_type" class="form-select" required>
                        <option value="in" {{ 'selected' if movement_type == 'in' }}>Stock In (+)</option>
                        <option value="out" {{ 'selected' if movement_type == 'out' }}>Stock Out (-)</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Quantity <span class="text-danger">*</span></label>
                    <input type="number" name="quantity" class="form-control" min="1" required value="{{ quantity or '' }}">
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Note</label>
                <textarea name="note" class="form-control" rows="2" placeholder="e.g. Bought 50pcs from Tokopedia">{{ note or '' }}</textarea>
            </div>
            <div class="mt-4">
                <button type="submit" class="btn btn-primary">Save</button>
                <a href="{{ url_for('movements.list') }}" class="btn btn-light border">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
