{% extends 'base.html' %}
{% block title %}{{ 'Edit' if component else 'New' }} Component{% endblock %}
{% block content %}
<h4>{{ 'Edit' if component else 'New' }} Component</h4>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">Name <span class="text-danger">*</span></label>
                    <input type="text" name="name" class="form-control" required value="{{ component.name if component else '' }}">
                </div>
                <div class="col-md-2">
                    <label class="form-label">Stock Code</label>
                    <input type="text" name="stock_code" class="form-control" placeholder="e.g. R-001" value="{{ component.stock_code or '' }}">
                </div>
                <div class="col-md-2">
                    <label class="form-label">Value</label>
                    <input type="text" name="value" class="form-control" placeholder="e.g. 10kΩ" value="{{ component.value or '' }}">
                </div>
                <div class="col-md-2">
                    <label class="form-label">Package</label>
                    <input type="text" name="package" class="form-control" placeholder="e.g. 0805, DIP-8" value="{{ component.package or '' }}">
                </div>
                <div class="col-md-2">
                    <label class="form-label">Unit</label>
                    <select name="unit" class="form-select">
                        <option value="pcs" {{ 'selected' if not component or component.unit == 'pcs' }}>pcs</option>
                        <option value="meter" {{ 'selected' if component and component.unit == 'meter' }}>meter</option>
                        <option value="gram" {{ 'selected' if component and component.unit == 'gram' }}>gram</option>
                        <option value="liter" {{ 'selected' if component and component.unit == 'liter' }}>liter</option>
                    </select>
                </div>
                <div class="col-12">
                    <label class="form-label">Description</label>
                    <textarea name="description" class="form-control" rows="2">{{ component.description or '' }}</textarea>
                </div>
                <div class="col-md-2">
                    <label class="form-label">Stock Quantity</label>
                    <input type="number" name="stock_qty" class="form-control" min="0"
                           value="{{ component.stock_qty if component else '0' }}">
                </div>
                <div class="col-md-2">
                    <label class="form-label">Min Stock</label>
                    <input type="number" name="min_stock" class="form-control" min="0"
                           value="{{ component.min_stock if component else '0' }}">
                </div>
                <div class="col-md-2">
                    <label class="form-label">Category</label>
                    <select name="category_id" class="form-select">
                        <option value="">-- No Category --</option>
                        {% for cat in categories %}
                        <option value="{{ cat.id }}" {{ 'selected' if component and component.category_id == cat.id }}>
                            {{ cat.name }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Vendor</label>
                    <select name="vendor_id" class="form-select">
                        <option value="">-- No Vendor --</option>
                        {% for v in vendors %}
                        <option value="{{ v.id }}" {{ 'selected' if component and component.vendor_id == v.id }}>
                            {{ v.name }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Purchase Price (Rp)</label>
                    <input type="number" name="purchase_price" class="form-control" min="0" step="0.01"
                           value="{{ component.purchase_price or '' }}">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Selling Price (Rp)</label>
                    <input type="number" name="selling_price" class="form-control" min="0" step="0.01"
                           value="{{ component.selling_price or '' }}">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Purchase URL</label>
                    <input type="url" name="purchase_url" class="form-control" placeholder="https://..."
                           value="{{ component.purchase_url or '' }}">
                </div>
            </div>
            <div class="mt-4">
                <button type="submit" class="btn btn-primary">Save</button>
                <a href="{{ url_for('components.list') }}" class="btn btn-light border">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
