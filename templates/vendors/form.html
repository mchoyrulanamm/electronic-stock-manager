{% extends 'base.html' %}
{% block title %}{{ 'Edit' if vendor else 'New' }} Vendor{% endblock %}
{% block content %}
<h4>{{ 'Edit' if vendor else 'New' }} Vendor</h4>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Name <span class="text-danger">*</span></label>
                    <input type="text" name="name" class="form-control" required value="{{ vendor.name if vendor else '' }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Contact Person</label>
                    <input type="text" name="contact_person" class="form-control" value="{{ vendor.contact_person or '' }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control" value="{{ vendor.email or '' }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Phone</label>
                    <input type="text" name="phone" class="form-control" value="{{ vendor.phone or '' }}">
                </div>
                <div class="col-12">
                    <label class="form-label">Address</label>
                    <textarea name="address" class="form-control" rows="2">{{ vendor.address or '' }}</textarea>
                </div>
                <div class="col-12">
                    <label class="form-label">Notes</label>
                    <textarea name="notes" class="form-control" rows="2">{{ vendor.notes or '' }}</textarea>
                </div>
            </div>
            <div class="mt-4">
                <button type="submit" class="btn btn-primary">Save</button>
                <a href="{{ url_for('vendors.list') }}" class="btn btn-light border">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
