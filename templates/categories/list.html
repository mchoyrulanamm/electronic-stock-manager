{% extends 'base.html' %}
{% block title %}Categories{% endblock %}
{% block content %}
<div class="page-header">
    <h4>Categories</h4>
    <a href="{{ url_for('categories.create') }}" class="btn btn-primary">
        <i class="bi bi-plus-lg"></i> New Category
    </a>
</div>

<div class="card card-table-scroll">
    <div class="card-body p-0">
        <table class="table table-hover mb-0">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Description</th>
                    <th class="text-end">Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for c in categories %}
                <tr>
                    <td class="fw-medium">{{ c.name }}</td>
                    <td class="text-muted">{{ c.description or '-' }}</td>
                    <td class="text-end">
                        <a href="{{ url_for('categories.edit', id=c.id) }}" class="btn btn-sm btn-outline-primary">Edit</a>
                        <form action="{{ url_for('categories.delete', id=c.id) }}" method="POST" class="d-inline"
                              onsubmit="return confirm('Delete this category?');">
                            <button class="btn btn-sm btn-outline-danger">Delete</button>
                        </form>
                    </td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="3" class="text-muted text-center py-4">No categories yet.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
