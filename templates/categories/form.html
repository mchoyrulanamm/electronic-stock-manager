{% extends 'base.html' %}
{% block title %}{{ 'Edit' if category else 'New' }} Category{% endblock %}
{% block content %}
<h4>{{ 'Edit' if category else 'New' }} Category</h4>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Name <span class="text-danger">*</span></label>
                    <input type="text" name="name" class="form-control" required value="{{ category.name if category else '' }}">
                </div>
                <div class="col-12">
                    <label class="form-label">Description</label>
                    <textarea name="description" class="form-control" rows="3">{{ category.description or '' }}</textarea>
                </div>
            </div>
            <div class="mt-4">
                <button type="submit" class="btn btn-primary">Save</button>
                <a href="{{ url_for('categories.list') }}" class="btn btn-light border">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
