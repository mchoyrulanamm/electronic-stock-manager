{% extends 'base.html' %}
{% block title %}Change Password{% endblock %}
{% block content %}
<h4>Change Password</h4>

<div class="card" style="max-width: 480px">
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Current Password</label>
                <input type="password" name="current_password" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">New Password</label>
                <input type="password" name="new_password" class="form-control" required minlength="4">
            </div>
            <div class="mb-3">
                <label class="form-label">Confirm New Password</label>
                <input type="password" name="confirm_password" class="form-control" required minlength="4">
            </div>
            <div class="mt-4">
                <button type="submit" class="btn btn-primary">Change Password</button>
                <a href="{{ url_for('index') }}" class="btn btn-light border">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
